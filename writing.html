<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Writing | Nikita Boyarkin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Articles on product analytics, A/B testing, and data science by Nikita Boyarkin." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="project-style.css" />
  <link rel="stylesheet" href="blog-style.css" />
</head>

<body>

  <nav>
    <a href="index.html" style="text-decoration: none; color: inherit;"><b>Portfolio</b></a>
    <ul class="links">
      <li><a href="writing.html" class="active">Writing</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
      <span class="theme-icon">🌙</span>
    </button>
  </nav>

  <main>
    <h1 class="page-title reveal">Writing</h1>

    <div class="filter-row reveal reveal-delay-1">
      <button class="filter-tag active" data-filter="all">All</button>
      <button class="filter-tag" data-filter="decision-log">Decision Logs</button>
    </div>

    <div class="blog-list reveal reveal-delay-2">
      <a href="posts/why-we-switched-to-bayesian-ab-testing.html" class="blog-card" data-category="decision-log">
        <span class="blog-card-tag">Decision Log</span>
        <div class="blog-card-title">Why We Switched to Bayesian A/B Testing</div>
        <div class="blog-card-meta">1 min read · Mar 15, 2025</div>
        <div class="blog-card-excerpt">Frequentist p-values were creating a culture of peeking. Here's how Bayesian inference changed our experiment workflow.</div>
      </a>
    </div>
  </main>

  <footer>
    <a href="https://github.com/NikitaBoyarkin">GitHub</a> ·
    <a href="https://www.linkedin.com/in/nikita-boyarkin">LinkedIn</a> ·
    <a href="https://t.me/lofinibo">Telegram</a>
    <p>© 2026 Nikita Boyarkin</p>
  </footer>

  <script src="theme.js"></script>
  <script>
    const filterTags = document.querySelectorAll('.filter-tag');
    const cards = document.querySelectorAll('.blog-card');
    filterTags.forEach(tag => {
      tag.addEventListener('click', () => {
        filterTags.forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        const filter = tag.dataset.filter;
        cards.forEach(card => {
          card.style.display = (filter === 'all' || card.dataset.category === filter) ? 'block' : 'none';
        });
      });
    });
  </script>

</body>
</html>
